<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lex · Professore AI di Diritto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
/* ─── Reset & base ─────────────────────────────────────────────────────── */
:root {
  --paper:   #faf7f0;
  --paper-2: #f4efe4;
  --paper-3: #ede6d5;
  --ink:     #1a1814;
  --ink-2:   #2c2820;
  --ink-3:   #4a4438;
  --ink-4:   #7a7160;
  --ink-5:   #aea796;
  --rule:       #d9d1bd;
  --rule-soft:  #e6dfcc;
  --accent:     #8a2c2c;
  --accent-soft: rgba(138,44,44,.08);
  --user:      #0b1220;
  --user-soft: #e9eef5;
  --serif: 'Newsreader','Iowan Old Style','Palatino',Georgia,serif;
  --sans:  'Inter',system-ui,-apple-system,sans-serif;
  --mono:  'JetBrains Mono',ui-monospace,monospace;
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 20% 0%,rgba(255,252,244,.7),transparent 40%),
    radial-gradient(circle at 80% 100%,rgba(237,230,213,.5),transparent 50%);
}
#root{height:100%}

/* ─── App ───────────────────────────────────────────────────────────────── */
.app{max-width:1480px;margin:0 auto;padding:18px 22px 32px;display:flex;flex-direction:column;min-height:100%}

/* ─── Topbar ────────────────────────────────────────────────────────────── */
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:32px;padding:12px 4px 18px;border-bottom:.5px solid var(--rule)}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:36px;height:36px;display:grid;place-items:center;border-radius:50%;background:var(--ink);color:var(--paper)}
.brand-name{font-family:var(--serif);font-size:22px;font-weight:600;letter-spacing:-.01em;line-height:1}
.brand-tag{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4);margin-top:3px}
.topnav{display:flex;gap:4px;justify-self:center}
.topnav-item{padding:8px 14px;font-size:13px;font-weight:500;color:var(--ink-4);border-radius:var(--r-sm);cursor:pointer;transition:color .15s,background .15s;text-decoration:none;display:block}
.topnav-item:hover{color:var(--ink);background:var(--paper-2)}
.topnav-item.active{color:var(--ink);background:var(--paper-2);box-shadow:inset 0 0 0 .5px var(--rule)}
.topbar-r{display:flex;align-items:center;gap:14px}
.lang-switch{display:flex;border:.5px solid var(--rule);border-radius:999px;padding:2px;background:var(--paper)}
.lang-switch button{appearance:none;border:0;background:transparent;color:var(--ink-4);padding:4px 10px;font:inherit;font-size:11px;font-weight:600;letter-spacing:.05em;border-radius:999px;cursor:pointer}
.lang-switch button.on{background:var(--ink);color:var(--paper)}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border:.5px solid var(--rule);border-radius:999px;background:var(--paper)}
.user-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:var(--paper);display:grid;place-items:center;font-weight:600;font-size:12px}
.user-name{font-size:12.5px;font-weight:500;color:var(--ink-2)}

/* ─── Layout ────────────────────────────────────────────────────────────── */
.layout{display:grid;grid-template-columns:380px 1fr;gap:18px;margin-top:18px}
.col-left,.col-right{display:flex;flex-direction:column;gap:18px}
.col-right{min-width:0}
.panel{background:var(--paper);border:.5px solid var(--rule);border-radius:var(--r-lg);box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 1px 2px rgba(26,24,20,.04)}
.panel-hd{padding:14px 18px 10px;border-bottom:.5px solid var(--rule-soft)}
.panel-hd-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink)}
.panel-hd-sub{font-size:12px;color:var(--ink-4);margin-top:2px}
.panel-eyebrow{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4)}

/* ─── Voice viz ─────────────────────────────────────────────────────────── */
.viz-panel{display:flex;flex-direction:column}
.viz-stage{height:320px;display:grid;place-items:center;background:linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%);position:relative;overflow:hidden}
.viz-stage::before,.viz-stage::after{content:'';position:absolute;left:0;right:0;height:1px;background:var(--rule-soft)}
.viz-stage::before{top:0}.viz-stage::after{bottom:0}
.vv-wrap{position:relative;display:grid;place-items:center}
.vv-canvas{display:block}
.vv-state{position:absolute;bottom:-8px;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);padding:6px 12px;border-radius:999px;background:var(--paper);border:.5px solid var(--rule)}
.vv-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-5)}
.vv-state[data-state="listening"] .vv-dot{background:#4a8fa8;animation:pulse 1.1s infinite}
.vv-state[data-state="thinking"]  .vv-dot{background:#c9a14a;animation:pulse 1.1s infinite}
.vv-state[data-state="speaking"]  .vv-dot{background:var(--accent);animation:pulse .7s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.viz-controls{display:flex;align-items:center;gap:8px;padding:18px 18px 12px}
.vc-btn{appearance:none;border:.5px solid var(--rule);background:var(--paper);color:var(--ink-2);padding:7px 10px;border-radius:var(--r-sm);font:inherit;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.vc-btn:hover{background:var(--paper-2)}
.vc-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.vc-primary:hover{background:var(--ink-2)}
.vc-speed{display:flex;margin-left:auto;gap:2px;padding:2px;background:var(--paper-2);border-radius:var(--r-sm)}
.vc-speed button{appearance:none;border:0;background:transparent;color:var(--ink-4);font:inherit;font-size:11px;font-weight:600;font-family:var(--mono);padding:4px 7px;border-radius:4px;cursor:pointer}
.vc-speed button.on{background:var(--paper);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.viz-track{position:relative;height:4px;margin:0 18px 16px;background:var(--paper-3);border-radius:2px}
.viz-track-bar{position:absolute;top:0;left:0;bottom:0;background:var(--accent);border-radius:2px;transition:width .1s linear}
.viz-track-tick{position:absolute;top:-3px;bottom:-3px;width:1.5px;background:var(--ink-3);opacity:.5}

/* ─── Upload ────────────────────────────────────────────────────────────── */
.up{padding:14px 18px 18px}
.up-drop{border:1px dashed var(--rule);border-radius:var(--r-md);padding:16px;display:flex;align-items:center;gap:12px;background:var(--paper-2);color:var(--ink-3);cursor:pointer;transition:all .15s}
.up-drop:hover{background:var(--paper-3);border-color:var(--ink-5)}
.up-drop.over{background:var(--accent-soft);border-color:var(--accent);border-style:solid}
.up-icon{color:var(--ink-4);flex-shrink:0}
.up-text-l1{font-size:13px;font-weight:500;color:var(--ink-2)}
.up-text-l2{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-4);margin-top:3px}
.up-badges{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.up-badge{display:flex;align-items:center;gap:10px;padding:8px 10px;border:.5px solid var(--rule);background:var(--paper);border-radius:var(--r-md)}
.up-badge-icon{width:28px;height:32px;display:grid;place-items:center;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.05em;color:#fff;flex-shrink:0}
.up-badge-info{flex:1;min-width:0;display:flex;flex-direction:column}
.up-badge-name{font-size:12.5px;font-weight:500;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.up-badge-meta{font-size:11px;color:var(--ink-4)}
.up-badge-x{appearance:none;border:0;background:transparent;color:var(--ink-4);cursor:pointer;padding:4px;border-radius:4px}
.up-badge-x:hover{background:var(--paper-2);color:var(--ink)}

/* ─── Chat ──────────────────────────────────────────────────────────────── */
.chat-panel{display:flex;flex-direction:column;min-height:460px}
.chat{display:flex;flex-direction:column;height:100%}
.chat-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:.5px solid var(--rule-soft)}
.chat-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink)}
.chat-sub{font-size:11.5px;color:var(--ink-4);margin-top:2px}
.chat-hd-r{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-3);padding:4px 10px;border-radius:999px;background:var(--paper-2);border:.5px solid var(--rule)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite}
.chat-scroll{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;min-height:320px;max-height:440px}
.chat-empty{margin:auto 0;text-align:center;padding:30px 20px;color:var(--ink-4)}
.chat-empty-icon{font-family:var(--serif);font-size:64px;line-height:.7;color:var(--ink-5);margin-bottom:8px}
.chat-empty-title{font-family:var(--serif);font-size:18px;color:var(--ink-2)}
.chat-empty-sub{font-size:12.5px;margin-top:6px;max-width:280px;margin-left:auto;margin-right:auto}
.bubble{max-width:88%;display:flex;flex-direction:column;gap:6px;animation:bubbleIn .35s ease-out}
@keyframes bubbleIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bubble-user{align-self:flex-end;align-items:flex-end}
.bubble-ai{align-self:flex-start}
.bubble-meta{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-4)}
.bubble-meta-l{display:inline-flex;align-items:center;gap:6px}
.bubble-meta-r{color:var(--ink-5)}
.bubble-avatar{width:16px;height:16px;border-radius:50%;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:var(--serif);font-size:10px;font-weight:600}
.bubble-body{padding:12px 14px;border-radius:14px;background:var(--user-soft);border:.5px solid #d4dce8;display:flex;flex-direction:column;gap:8px}
.bubble-user .bubble-body{border-top-right-radius:4px}
.bubble-text{font-size:13.5px;line-height:1.55;color:var(--ink)}
.bubble-text-ai{font-family:var(--serif);font-size:16px;line-height:1.55;padding:4px 0;color:var(--ink)}
.tok{color:var(--ink-5);transition:color .2s}
.tok-on{color:inherit}
.bubble-user .tok{color:var(--ink-4)}
.bubble-user .tok-on{color:var(--ink)}
.wf{display:flex;align-items:center;gap:2px;height:18px}
.wf-bar{width:2px;border-radius:1px;background:currentColor;transition:height .05s linear}
.caret{display:inline-block;width:2px;height:1em;background:var(--accent);vertical-align:text-bottom;margin-left:1px;animation:blink .9s infinite}
@keyframes blink{50%{opacity:0}}
.bubble-thinking .thinking-dots{display:flex;gap:4px;padding:12px 14px}
.bubble-thinking .thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--ink-5);animation:bounce 1.2s infinite}
.bubble-thinking .thinking-dots span:nth-child(2){animation-delay:.15s}
.bubble-thinking .thinking-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
.chat-input{display:flex;align-items:center;gap:8px;padding:12px 14px;border-top:.5px solid var(--rule-soft);background:var(--paper-2);border-radius:0 0 var(--r-lg) var(--r-lg)}
.chat-input input{flex:1;border:.5px solid var(--rule);background:var(--paper);border-radius:var(--r-sm);padding:9px 12px;font:inherit;font-size:13px;color:var(--ink);outline:none}
.chat-input input:focus{border-color:var(--ink-4)}
.mic-btn,.send-btn{appearance:none;width:34px;height:34px;border-radius:50%;border:.5px solid var(--rule);background:var(--paper);color:var(--ink-2);display:grid;place-items:center;cursor:pointer;flex-shrink:0}
.mic-btn:hover,.send-btn:hover{background:var(--paper-3)}
.mic-btn-on{background:var(--accent);color:var(--paper);border-color:var(--accent)}
.send-btn{background:var(--ink);color:var(--paper);border-color:var(--ink)}

/* ─── Sources ────────────────────────────────────────────────────────────── */
.sources-shell{padding:0}
.src{padding:14px 18px 16px}
.src-hd{margin-bottom:12px}
.src-title{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
.src-count{font-family:var(--mono);font-size:10px;font-weight:500;background:var(--paper-3);color:var(--ink-3);padding:1px 7px;border-radius:999px}
.src-sub{font-size:11.5px;color:var(--ink-4);margin-top:2px}
.src-empty{padding:14px 8px;display:flex;flex-direction:column;gap:6px}
.src-empty-line{height:8px;background:var(--paper-2);border-radius:3px}
.src-empty-line.short{width:60%}
.src-empty-text{font-size:11.5px;color:var(--ink-5);margin-top:8px;font-style:italic}
.src-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.src-card{display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:12px;padding:11px 12px;border:.5px solid var(--rule);border-radius:var(--r-md);background:var(--paper);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.src-card:hover{background:var(--paper-2);border-color:var(--ink-5)}
.src-card.active{border-color:var(--accent);background:linear-gradient(180deg,var(--accent-soft),transparent);box-shadow:inset 3px 0 0 var(--accent)}
.src-card.fresh{animation:freshPulse 1.5s ease-out}
@keyframes freshPulse{0%{background:var(--accent-soft)}100%{background:transparent}}
.src-card-num{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--ink-4);padding-top:2px;letter-spacing:.05em}
.src-card-doc{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:600}
.src-card-excerpt{font-family:var(--serif);font-size:14.5px;color:var(--ink);margin-top:4px;line-height:1.35}
.src-card-ref{font-family:var(--mono);font-size:10.5px;color:var(--ink-4);margin-top:5px}
.src-card-arrow{color:var(--ink-5);padding-top:3px}
.src-card.active .src-card-arrow{color:var(--accent)}

/* ─── Document viewer ───────────────────────────────────────────────────── */
.doc-panel{margin-top:18px;padding:0;overflow:hidden}
.doc{display:flex;flex-direction:column}
.doc-hd{display:flex;justify-content:space-between;align-items:flex-start;padding:22px 28px 18px;border-bottom:.5px solid var(--rule-soft);background:linear-gradient(180deg,var(--paper-2),var(--paper))}
.doc-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.doc-pill{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;color:var(--accent);background:var(--accent-soft);padding:3px 8px;border-radius:999px}
.doc-meta-mini{font-family:var(--mono);font-size:10.5px;color:var(--ink-4)}
.doc-title{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--ink);margin:0;letter-spacing:-.005em}
.doc-sub{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-3);margin-top:3px}
.doc-icon-btn{appearance:none;border:.5px solid var(--rule);background:var(--paper);color:var(--ink-3);padding:7px;border-radius:var(--r-sm);cursor:pointer}
.doc-scroll{max-height:520px;overflow-y:auto;background:var(--paper);background-image:linear-gradient(90deg,var(--paper-2) 0%,transparent 4%,transparent 96%,var(--paper-2) 100%)}
.doc-page{max-width:760px;margin:0 auto;padding:32px 40px 48px}
.doc-para{margin-bottom:22px;scroll-margin-top:80px}
.doc-para-label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-4);font-weight:600;margin-bottom:6px;border-left:2px solid var(--rule);padding-left:10px}
.doc-para-text{font-family:var(--serif);font-size:17px;line-height:1.65;color:var(--ink);margin:0;text-wrap:pretty;hyphens:auto}
.doc-foot{margin-top:32px;text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--ink-5);text-transform:uppercase;letter-spacing:.1em;padding-top:18px;border-top:.5px dashed var(--rule)}

/* ─── Footbar ───────────────────────────────────────────────────────────── */
.footbar{display:flex;justify-content:space-between;margin-top:18px;padding:12px 4px;border-top:.5px solid var(--rule);font-family:var(--mono);font-size:10.5px;color:var(--ink-4);letter-spacing:.05em}
.footbar em{font-style:normal;color:var(--ink-2);font-weight:500}
.footbar-r{display:flex;gap:10px}

/* ─── Tweaks hint ───────────────────────────────────────────────────────── */
.twk-hint{font-size:10.5px;color:rgba(41,38,27,.5);font-style:italic;line-height:1.4;padding:0 2px}

/* ─── Responsive ────────────────────────────────────────────────────────── */
@media(max-width:1100px){
  .layout{grid-template-columns:1fr}
  .topnav{display:none}
}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- ── Tweaks panel (must be first: exports useTweaks etc. to window) ── -->
  <script type="text/babel">
const __TWEAKS_STYLE = `

  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;

    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right  = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight  = window.innerWidth  - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}
function TweakRow({ label, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span></div>
      {children}
    </div>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;
  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };
  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>
        ))}
      </div>
    </TweakRow>
  );
}
function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}
function TweakButton({ label, onClick, secondary = false }) {
  return <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>;
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakRadio, TweakColor, TweakButton });
  </script>

  <!-- ── Voice Visualizer ── -->
  <script type="text/babel">
function VoiceVisualizer({ state = 'idle', accentColor = '#8a2c2c', size = 300 }) {
  const canvasRef = React.useRef(null);
  const stateRef  = React.useRef(state);
  stateRef.current = state;

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
    ctx.scale(dpr, dpr);
    let raf, amp = 0, targetAmp = 0;
    const draw = () => {
      const t  = performance.now() / 1000;
      const cx = size / 2, cy = size / 2;
      const s  = stateRef.current;
      if      (s === 'idle')      targetAmp = 0.15;
      else if (s === 'listening') targetAmp = 0.55;
      else if (s === 'thinking')  targetAmp = 0.35;
      else if (s === 'speaking')  targetAmp = 0.95;
      amp += (targetAmp - amp) * 0.06;
      ctx.clearRect(0, 0, size, size);
      const hex = accentColor.replace('#','');
      const r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
      const rgb = `${r},${g},${b}`;
      const ringCount = 5, baseRadius = size * 0.18, maxRadius = size * 0.46;
      for (let i = 0; i < ringCount; i++) {
        const phase  = t * (0.4 + i * 0.07) + i * 0.9;
        const breath = Math.sin(phase) * 0.5 + 0.5;
        const ringAmp= amp * (0.6 + 0.4 * Math.sin(phase * 1.3 + i));
        const radius = baseRadius + (maxRadius - baseRadius) * (i / (ringCount-1)) + breath * 8 * amp;
        ctx.beginPath();
        const segs = 96;
        for (let j = 0; j <= segs; j++) {
          const ang    = (j / segs) * Math.PI * 2;
          const wobble = Math.sin(ang * 3 + t * 1.2 + i * 0.7) * 4 * ringAmp + Math.sin(ang * 5 - t * 0.8 + i * 1.3) * 2.5 * ringAmp;
          const rad    = radius + wobble;
          const x = cx + Math.cos(ang) * rad, y = cy + Math.sin(ang) * rad;
          if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        const opacity = (0.18 + 0.32 * (1 - i / ringCount)) * (0.5 + 0.5 * amp);
        ctx.strokeStyle = `rgba(${rgb},${opacity.toFixed(3)})`;
        ctx.lineWidth = i === 0 ? 1.4 : 0.8;
        ctx.stroke();
      }
      const innerR = baseRadius * (0.55 + 0.15 * Math.sin(t * 1.8) * amp);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, innerR);
      grad.addColorStop(0,   `rgba(${rgb},${(0.35+0.4*amp).toFixed(3)})`);
      grad.addColorStop(0.7, `rgba(${rgb},${(0.15+0.2*amp).toFixed(3)})`);
      grad.addColorStop(1,   `rgba(${rgb},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(cx, cy, innerR * 1.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, 3 + 1.5 * amp, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${rgb},.9)`; ctx.fill();
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(raf);
  }, [size, accentColor]);

  const stateLabel = {
    idle:      { it:'In ascolto',       en:'Listening' },
    listening: { it:'Stai parlando…',   en:'You are speaking…' },
    thinking:  { it:'Sta elaborando…',  en:'Thinking…' },
    speaking:  { it:'Il Professore parla', en:'Professor speaking' },
  };
  const lang = window.__lang || 'it';
  return (
    <div className="vv-wrap">
      <canvas ref={canvasRef} className="vv-canvas" />
      <div className="vv-state" data-state={state}>
        <span className="vv-dot" />
        <span>{stateLabel[state][lang]}</span>
      </div>
    </div>
  );
}
window.VoiceVisualizer = VoiceVisualizer;
  </script>

  <script type="text/babel">
function WaveformBars({ active, color = 'currentColor', bars = 18 }) {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    if (!active) return;
    let raf;
    const loop = () => { setTick((t) => t + 1); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [active]);
  const heights = Array.from({ length: bars }, (_, i) => {
    const seed = (i * 13.37 + tick * 0.12) % 6.28;
    const h = active ? 0.25 + 0.75 * Math.abs(Math.sin(seed) * Math.cos(seed * 0.7 + i)) : 0.2 + 0.15 * Math.sin(i * 0.9);
    return Math.max(0.12, Math.min(1, h));
  });
  return (
    <div className="wf">
      {heights.map((h, i) => (
        <span key={i} className="wf-bar" style={{ height: `${(h*100).toFixed(0)}%`, background: color }} />
      ))}
    </div>
  );
}

function ChatBubble({ msg, lang, currentTime }) {
  const txt = msg.text[lang];
  const isUser = msg.role === 'user';
  const elapsed  = currentTime - msg.startT;
  const progress = Math.max(0, Math.min(1, elapsed / (msg.duration || (isUser ? 3 : 6))));
  const words    = txt.split(/\s+/);
  const cutoff   = Math.floor(progress * words.length + 0.001);
  const speaking = elapsed >= 0 && elapsed < (msg.duration || (isUser ? 3 : 6));

  if (isUser) {
    return (
      <div className="bubble bubble-user">
        <div className="bubble-meta">
          <span className="bubble-meta-l">{lang === 'en' ? 'You' : 'Tu'}</span>
          <span className="bubble-meta-r">{lang === 'en' ? 'Voice' : 'Vocale'}</span>
        </div>
        <div className="bubble-body">
          <WaveformBars active={speaking} color="rgba(11,18,32,.55)" />
          <div className="bubble-text">
            {words.map((w, i) => (
              <span key={i} className={i < cutoff ? 'tok tok-on' : 'tok'}>{w}{i < words.length-1 ? ' ' : ''}</span>
            ))}
          </div>
        </div>
      </div>
    );
  }
  return (
    <div className="bubble bubble-ai">
      <div className="bubble-meta">
        <span className="bubble-meta-l">
          <span className="bubble-avatar" aria-hidden>L</span>
          {lang === 'en' ? 'Lex · AI Professor' : 'Lex · Professore AI'}
        </span>
        <span className="bubble-meta-r">
          {speaking ? (lang === 'en' ? '● speaking' : '● sta parlando') : (lang === 'en' ? 'Reply' : 'Risposta')}
        </span>
      </div>
      <div className="bubble-text bubble-text-ai">
        {words.map((w, i) => (
          <span key={i} className={i < cutoff ? 'tok tok-on' : 'tok'}>{w}{i < words.length-1 ? ' ' : ''}</span>
        ))}
        {speaking && cutoff < words.length && <span className="caret" />}
      </div>
    </div>
  );
}

function ThinkingBubble({ lang }) {
  return (
    <div className="bubble bubble-ai bubble-thinking">
      <div className="bubble-meta">
        <span className="bubble-meta-l">
          <span className="bubble-avatar" aria-hidden>L</span>
          {lang === 'en' ? 'Lex · AI Professor' : 'Lex · Professore AI'}
        </span>
      </div>
      <div className="thinking-dots"><span/><span/><span/></div>
    </div>
  );
}

function ChatPanel({ messages, thinking, lang, currentTime, onSend, onMic, micActive }) {
  const scrollRef = React.useRef(null);
  const [draft, setDraft] = React.useState('');
  React.useEffect(() => {
    if (!scrollRef.current) return;
    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages.length, thinking]);
  return (
    <section className="chat">
      <header className="chat-hd">
        <div>
          <div className="chat-title">{lang === 'en' ? 'Conversation' : 'Conversazione'}</div>
          <div className="chat-sub">{lang === 'en' ? 'Live transcript · IT/EN' : 'Trascrizione live · IT/EN'}</div>
        </div>
        <div className="chat-hd-r">
          <span className="live-dot" />
          {lang === 'en' ? 'Live' : 'In diretta'}
        </div>
      </header>
      <div ref={scrollRef} className="chat-scroll">
        {messages.length === 0 && !thinking && (
          <div className="chat-empty">
            <div className="chat-empty-icon">"</div>
            <div className="chat-empty-title">{lang === 'en' ? 'Ask Professor Lex anything' : 'Chiedi qualsiasi cosa al Professor Lex'}</div>
            <div className="chat-empty-sub">{lang === 'en' ? 'Speak or type. Cited sources will be highlighted in the document below.' : 'Parla o scrivi. Le fonti citate verranno evidenziate nel documento qui sotto.'}</div>
          </div>
        )}
        {messages.map((m) => <ChatBubble key={m.id} msg={m} lang={lang} currentTime={currentTime} />)}
        {thinking && <ThinkingBubble lang={lang} />}
      </div>
      <footer className="chat-input">
        <button className={micActive ? 'mic-btn mic-btn-on' : 'mic-btn'} onClick={onMic} aria-label={lang === 'en' ? 'Toggle voice' : 'Attiva voce'}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <rect x="9" y="3" width="6" height="12" rx="3"/>
            <path d="M5 11a7 7 0 0 0 14 0"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
          </svg>
        </button>
        <input type="text" value={draft} onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter' && draft.trim()) { onSend(draft.trim()); setDraft(''); } }}
          placeholder={lang === 'en' ? 'Type a question, or press the mic to speak…' : 'Scrivi una domanda, oppure premi il microfono per parlare…'}
        />
        <button className="send-btn" onClick={() => { if (draft.trim()) { onSend(draft.trim()); setDraft(''); } }} aria-label={lang === 'en' ? 'Send' : 'Invia'}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
          </svg>
        </button>
      </footer>
    </section>
  );
}
window.ChatPanel = ChatPanel;
  </script>

  <!-- ── Sources Panel ── -->
  <script type="text/babel">
function SourcesPanel({ sources, lang, activeId, onSelect }) {
  return (
    <section className="src">
      <header className="src-hd">
        <div className="src-title">
          {lang === 'en' ? 'Cited sources' : 'Fonti citate'}
          <span className="src-count">{sources.length}</span>
        </div>
        <div className="src-sub">{lang === 'en' ? 'Tap to open in document viewer' : 'Tocca per aprire nel visualizzatore'}</div>

      {sources.length === 0 ? (
        <div className="src-empty">
          <div className="src-empty-line" /><div className="src-empty-line short" /><div className="src-empty-line" />
          <div className="src-empty-text">{lang === 'en' ? 'Sources will appear here as the Professor cites them.' : 'Le fonti appariranno qui man mano che il Professore le cita.'}</div>
        </div>

        <ul className="src-list">

                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>

            </li>

  <!-- ── Upload Panel ── -->
  <script type="text/babel">
function UploadPanel({ files, lang, onAdd, onRemove }) {
  const [dragOver, setDragOver] = React.useState(false);
  const inputRef = React.useRef(null);
  const handleFiles = (fileList) => {
    Array.from(fileList || []).forEach((f) => {
      const ext = f.name.split('.').pop().toLowerCase();
      onAdd({ id: 'f' + Date.now() + Math.random().toString(36).slice(2,6), name: f.name, size: f.size, type: ext });
    });
  };
  const fmtSize = (b) => b < 1024 ? b+' B' : b < 1024*1024 ? (b/1024).toFixed(0)+' KB' : (b/1024/1024).toFixed(1)+' MB';
  const iconFor = (type) => {
    const t = (type||'').toLowerCase();
    if (t==='pdf') return { c:'#b54343', l:'PDF' };
    if (t==='doc'||t==='docx') return { c:'#2b5797', l:'DOC' };
    if (t==='xls'||t==='xlsx'||t==='csv') return { c:'#1f7245', l:'XLS' };
    return { c:'#6b6256', l:(t.toUpperCase().slice(0,3)||'FILE') };
  };
  return (
    <div className="up">
      <div className={'up-drop' + (dragOver ? ' over' : '')}
        onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
        onDragLeave={() => setDragOver(false)}
        onDrop={(e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
        onClick={() => inputRef.current?.click()}
      >
        <input ref={inputRef} type="file" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.csv" style={{display:'none'}} onChange={(e) => handleFiles(e.target.files)} />
        <svg className="up-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div className="up-text">
          <div className="up-text-l1">{lang === 'en' ? 'Drop a document to add to context' : 'Trascina un documento da aggiungere al contesto'}</div>
          <div className="up-text-l2">PDF · DOCX · XLSX · CSV</div>
        </div>
      </div>
      {files.length > 0 && (
        <div className="up-badges">
          {files.map((f) => {
            const ic = iconFor(f.type);
            return (
              <div key={f.id} className="up-badge">
                <span className="up-badge-icon" style={{ background: ic.c }}>{ic.l}</span>
                <span className="up-badge-info">
                  <span className="up-badge-name">{f.name}</span>
                  <span className="up-badge-meta">{fmtSize(f.size)} · {lang === 'en' ? 'Added to context' : 'Aggiunto al contesto'}</span>
                </span>
                <button className="up-badge-x" onClick={(e) => { e.stopPropagation(); onRemove(f.id); }} aria-label="Remove">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                    <line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>
                  </svg>
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
window.UploadPanel = UploadPanel;
  </script>

  <!-- ── Document Viewer ── -->
  <script type="text/babel">
function DocumentViewer({ doc, lang, highlights, currentTime, accentColor, hlStyle = 'underline' }) {
  const paragraphs   = doc.paragraphs[lang];
  const containerRef = React.useRef(null);
  const activeRefs   = React.useRef({});

  React.useEffect(() => {
    const active = highlights.find((h) => currentTime >= h.t0 && currentTime <= h.t0 + h.duration);
    if (!active) return;
    const node = activeRefs.current[active.para];
    if (!node || !containerRef.current) return;
    const c = containerRef.current;
    c.scrollTo({ top: node.offsetTop - c.offsetTop - 80, behavior: 'smooth' });
  }, [highlights.map((h) => h.t0).join(','), currentTime > 0 ? Math.floor(currentTime) : 0]);

  const hex = accentColor.replace('#','');
  const r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);

  return (
    <section className="doc">
      <header className="doc-hd">
        <div>
          <div className="doc-eyebrow">
            <span className="doc-pill">{lang === 'en' ? 'Active source' : 'Fonte attiva'}</span>
            <span className="doc-meta-mini">{doc.meta[lang]}</span>
          </div>
          <h2 className="doc-title">{doc.title[lang]}</h2>
          <div className="doc-sub">{doc.subtitle[lang]}</div>
        </div>
        <button className="doc-icon-btn" title={lang === 'en' ? 'Open externally' : 'Apri esternamente'}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </button>
      </header>

      <div className={'doc-scroll hl-' + hlStyle} ref={containerRef}>
        <div className="doc-page">
          {paragraphs.map((p) => {
            const tokens = p.text.split(/\s+/);
            const paraHL = highlights.filter((h) => h.para === p.id);
            return (
              <article key={p.id} className="doc-para" ref={(el) => { activeRefs.current[p.id] = el; }}>
                <div className="doc-para-label">{p.label}</div>
                <p className="doc-para-text">
                  {tokens.map((tok, i) => {
                    let progress = 0, inRange = false, isLeading = false;
                    for (const h of paraHL) {
                      if (i < h.start || i >= h.end) continue;
                      inRange = true;
                      const elapsed = currentTime - h.t0;
                      if (elapsed < 0) continue;
                      const span    = h.end - h.start;
                      const overall = Math.max(0, Math.min(1, elapsed / h.duration));
                      const reached = h.start + overall * span;
                      const local   = Math.max(0, Math.min(1, reached - i));
                      if (local > progress) progress = local;
                      if (local > 0.001 && local < 0.999) isLeading = true;
                    }
                    const cls = 'doc-tok' + (inRange ? ' in-range' : '') + (isLeading ? ' lead' : '') + (progress >= 1 ? ' done' : '');
                    return (
                      <span key={i} className={cls} style={{ '--p': progress.toFixed(3) }}>
                        {tok}{i < tokens.length-1 ? ' ' : ''}
                      </span>
                    );
                  })}
                </p>
              </article>
            );
          })}
          <div className="doc-foot">{lang === 'en' ? 'End of excerpt · Page 1 of 142' : 'Fine estratto · Pagina 1 di 142'}</div>
        </div>
      </div>

      <style>{`
        .doc-tok { position:relative; padding:0 2px 4px; color:var(--ink); background:transparent; border-radius:2px; }

        /* A: UNDERLINE */
        .hl-underline .doc-tok {
          background-image: linear-gradient(to right, ${accentColor} 0%, ${accentColor} 50%, transparent 50.001%, transparent 100%);
          background-repeat: no-repeat; background-size: 200% 1.5px;
          background-position: calc(100% - var(--p,0) * 100%) 100%;
          transition: background-position .18s linear;
        }
        .hl-underline .doc-tok.done {
          background-image: linear-gradient(to right, rgba(${r},${g},${b},.7) 0%, rgba(${r},${g},${b},.7) 50%, transparent 50.001%, transparent 100%);
        }

        /* B: MARKER */
        .hl-marker .doc-tok {
          background-image: linear-gradient(to right, rgba(${r},${g},${b},.32) 0%, rgba(${r},${g},${b},.32) 50%, transparent 50.001%, transparent 100%);
          background-repeat: no-repeat; background-size: 200% 90%;
          background-position: calc(100% - var(--p,0) * 100%) 60%;
          transition: background-position .18s linear, background-size .3s;
        }
        .hl-marker .doc-tok.done { background-image: linear-gradient(to right, rgba(${r},${g},${b},.22) 0%, rgba(${r},${g},${b},.22) 50%, transparent 50.001%, transparent 100%); }
        .hl-marker .doc-tok.lead { background-image: linear-gradient(to right, rgba(${r},${g},${b},.42) 0%, rgba(${r},${g},${b},.42) 50%, transparent 50.001%, transparent 100%); }

        /* C: HYBRID */
        .hl-hybrid .doc-tok {
          background-image:
            linear-gradient(to right, ${accentColor} 0%, ${accentColor} 50%, transparent 50.001%, transparent 100%),
            linear-gradient(to right, rgba(${r},${g},${b},.16) 0%, rgba(${r},${g},${b},.16) 50%, transparent 50.001%, transparent 100%);
          background-repeat: no-repeat, no-repeat;
          background-size: 200% 1.5px, 200% 80%;
          background-position: calc(100% - var(--p,0) * 100%) 100%, calc(100% - var(--p,0) * 100%) 60%;
          transition: background-position .18s linear;
        }
        .hl-hybrid .doc-tok.done {
          background-image:
            linear-gradient(to right, rgba(${r},${g},${b},.7) 0%, rgba(${r},${g},${b},.7) 50%, transparent 50.001%, transparent 100%),
            linear-gradient(to right, rgba(${r},${g},${b},.10) 0%, rgba(${r},${g},${b},.10) 50%, transparent 50.001%, transparent 100%);
        }
        .hl-hybrid .doc-tok.lead::after { display:none; }
      `}</style>
    </section>
  );
}
window.DocumentViewer = DocumentViewer;
  </script>

  <!-- ── App root ── -->
  <script type="text/babel">
const TWEAK_DEFAULTS = { highlightColor: '#8a2c2c', hlStyle: 'underline' };

function useTimeline(running, speed = 1) {
  const [t, setT] = React.useState(0);
  const lastRef   = React.useRef(performance.now());
  React.useEffect(() => {
    if (!running) return;
    let raf;
    lastRef.current = performance.now();
    const tick = () => {
      const now = performance.now();
      setT((p) => p + ((now - lastRef.current) / 1000) * speed);
      lastRef.current = now;
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [running, speed]);
  return [t, setT];
}

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = React.useState('it');
  React.useEffect(() => { window.__lang = lang; }, [lang]);

  const [playing, setPlaying] = React.useState(true);
  const [speed, setSpeed]     = React.useState(1);
  const [t, setT]             = useTimeline(playing, speed);
  const [files, setFiles]     = React.useState([]);
  const [vizState, setVizState] = React.useState('idle');

  const SC = window.SCENARIO;

  const { messages, sources, thinking, highlights } = React.useMemo(() => {
    const messages = [], sources = [], highlights = [];
    let thinking = false;
    for (const ev of SC.events) {
      if (ev.t > t) break;
      if (ev.kind === 'user-msg')   messages.push({ id:ev.id, role:'user', text:ev.text, startT:ev.t, duration:ev.duration });
      else if (ev.kind === 'ai-msg')   { messages.push({ id:ev.id, role:'ai', text:ev.text, startT:ev.t, duration:ev.duration }); thinking = false; }
      else if (ev.kind === 'ai-thinking') thinking = true;
      else if (ev.kind === 'ai-cite') {
        sources.push({ id:ev.sourceId, doc:ev.doc, excerpt:ev.excerpt, ref:ev.ref, t0:ev.t });
        highlights.push({ para:ev.highlight.para, start:ev.highlight.start, end:ev.highlight.end, duration:ev.highlight.duration, t0:ev.t });
      }
    }
    sources.forEach((s) => { s._fresh = (t - s.t0) < 1.5; });
    return { messages, sources, thinking, highlights };
  }, [t]);

  React.useEffect(() => { if (t >= SC.totalDuration) setT(0); }, [t]);

  React.useEffect(() => {
    let state = 'idle';
    for (const ev of SC.events) {
      if (ev.t > t) break;
      if (ev.kind === 'user-start') state = 'listening';
      else if (ev.kind === 'user-end') state = 'idle';
      else if (ev.kind === 'ai-thinking') state = 'thinking';
      else if (ev.kind === 'ai-start') state = 'speaking';
      else if (ev.kind === 'ai-end') state = 'idle';
    }
    setVizState(state);
  }, [t]);

  const activeSourceId = React.useMemo(() => {
    for (let i = highlights.length-1; i >= 0; i--) {
      const h = highlights[i];
      if (t >= h.t0 && t <= h.t0 + h.duration) {
        const s = sources.find((x) => x.t0 === h.t0);
        if (s) return s.id;
      }
    }
    return sources[sources.length-1]?.id;
  }, [t, highlights, sources]);

  const fmtTime = (s) => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <div className="brand-mark">
            <svg viewBox="0 0 32 32" width="22" height="22" aria-hidden>
              <circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" strokeWidth="1"/>
              <circle cx="16" cy="16" r="8"  fill="none" stroke="currentColor" strokeWidth="1"/>
              <circle cx="16" cy="16" r="3"  fill="currentColor"/>
            </svg>
          </div>
          <div>
            <div className="brand-name">Lex</div>
            <div className="brand-tag">{lang === 'en' ? 'AI Professor of Law' : 'Professore AI di Diritto'}</div>
          </div>
        </div>
        <nav className="topnav">
          {['Studio','Biblioteca','Sessioni','Appunti'].map((item, i) => (
            <a key={item} className={'topnav-item' + (i===0?' active':'')}>{lang==='en' ? ['Studio','Library','Sessions','Notes'][i] : item}</a>
          ))}
        </nav>
        <div className="topbar-r">
          <div className="lang-switch">
            <button className={lang==='it'?'on':''} onClick={() => setLang('it')}>IT</button>
            <button className={lang==='en'?'on':''} onClick={() => setLang('en')}>EN</button>
          </div>
          <div className="user-chip">
            <div className="user-avatar">M</div>
            <div className="user-name">Marco R.</div>
          </div>
        </div>
      </header>

      <div className="layout">
        {/* LEFT */}
        <aside className="col-left">
          <div className="panel viz-panel">
            <div className="panel-eyebrow">
              <span>{lang==='en'?'Live session':'Sessione live'}</span>
              <span>{fmtTime(t)} / {fmtTime(SC.totalDuration)}</span>
            </div>
            <div className="viz-stage">
              <VoiceVisualizer state={vizState} accentColor={tw.highlightColor} size={300} />
            </div>
            <div className="viz-controls">
              <button className="vc-btn vc-primary" onClick={() => setPlaying((p) => !p)}>
                {playing
                  ? <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
                  : <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
                }
                <span>{playing ? (lang==='en'?'Pause demo':'Pausa demo') : (lang==='en'?'Play demo':'Avvia demo')}</span>
              </button>
              <button className="vc-btn" onClick={() => setT(0)} title={lang==='en'?'Restart':'Riavvia'}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
              </button>
              <div className="vc-speed">
                {[0.5,1,1.5,2].map((s) => (
                  <button key={s} className={speed===s?'on':''} onClick={() => setSpeed(s)}>{s}×</button>
                ))}
              </div>
            </div>
            <div className="viz-track">
              <div className="viz-track-bar" style={{ width: `${Math.min(100,(t/SC.totalDuration)*100)}%` }} />
              {SC.events.filter((e) => e.kind==='ai-cite').map((e, i) => (
                <span key={i} className="viz-track-tick" style={{ left: `${(e.t/SC.totalDuration)*100}%` }} />
              ))}
            </div>
          </div>

          <div className="panel">
            <div className="panel-hd">
              <div className="panel-hd-title">{lang==='en'?'Context documents':'Documenti di contesto'}</div>
              <div className="panel-hd-sub">{lang==='en'?'Add files to ground replies':'Aggiungi file per ancorare le risposte'}</div>
            </div>
            <UploadPanel files={files} lang={lang} onAdd={(f) => setFiles((xs) => [...xs,f])} onRemove={(id) => setFiles((xs) => xs.filter((x) => x.id!==id))} />
          </div>
        </aside>

        {/* RIGHT */}
        <main className="col-right">
          <div className="panel chat-panel">
            <ChatPanel messages={messages} thinking={thinking} lang={lang} currentTime={t} micActive={vizState==='listening'} onMic={() => {}} onSend={() => {}} />
          </div>
          <div className="panel sources-shell">
            <SourcesPanel sources={sources} lang={lang} activeId={activeSourceId} />
          </div>
        </main>
      </div>

      {/* Document viewer */}
      <div className="panel doc-panel">
        <DocumentViewer doc={SC.document} lang={lang} highlights={highlights} currentTime={t} accentColor={tw.highlightColor} hlStyle={tw.hlStyle} />
      </div>

      <footer className="footbar">
        <div>{lang==='en'?'Lex Studio v1.0 · Prototype':'Lex Studio v1.0 · Prototipo'}</div>
        <div className="footbar-r">
          <span>{lang==='en'?'Transcript':'Trascrizione'}: <em>active</em></span>
          <span>·</span>
          <span>{lang==='en'?'Citations':'Citazioni'}: <em>{sources.length}</em></span>
          <span>·</span>
          <span>{lang==='en'?'Latency':'Latenza'}: <em>120ms</em></span>
        </div>
      </footer>

      <TweaksPanel title="Tweaks">
        <TweakSection label={lang==='en'?'Highlight':'Evidenziazione'} />
        <TweakRadio
          label={lang==='en'?'Style':'Stile'}
          value={tw.hlStyle}
          options={[
            { value:'underline', label:lang==='en'?'Underline':'Sottolinea' },
            { value:'marker',    label:lang==='en'?'Marker':'Evidenz.' },
            { value:'hybrid',    label:lang==='en'?'Hybrid':'Ibrido' },
          ]}
          onChange={(v) => setTweak('hlStyle', v)}
        />
        <TweakColor label={lang==='en'?'Color':'Colore'} value={tw.highlightColor} onChange={(v) => setTweak('highlightColor', v)} />
        <div className="twk-hint">
          {lang==='en'
            ? 'A = thin growing underline · B = marker fill · C = soft fill + underline.'
            : 'A = sottolineatura sottile · B = evidenziatore pieno · C = sfondo tenue + sottolineatura.'}
        </div>
        <TweakSection label="Demo" />
        <TweakRadio
          label={lang==='en'?'Speed':'Velocità'}
          value={String(speed)}
          options={['0.5','1','1.5','2']}
          onChange={(v) => setSpeed(Number(v))}
        />
        <TweakButton label={lang==='en'?'Restart demo':'Riavvia demo'} secondary onClick={() => setT(0)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
